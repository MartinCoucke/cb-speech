name: Daily CB speeches digest

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC = 07:00 London (BST)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cb-speeches
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # Cache the Chromium binary across runs so we don't redownload ~130MB
      # every day (the ECB scraper needs it).
      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Install Playwright system deps (cached binary still needs apt deps)
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Run digest
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: Commit updated state
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/ archive/ runs.log
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "state: $(date -u +%Y-%m-%dT%H:%MZ) speeches digest"
            git push
          fi
